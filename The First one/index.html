<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Flow Optimizer</title>
</head>
<body>
    <div class="container">
        <h1>Daily Flow Optimizer</h1>
        <p class="subtitle">Plan your day for better productivity</p>

        <div class="input-section">
            <h2>Your Schedule</h2>
            <label for="wakeUp">Wake Up Time:</label>
            <input type="time" id="wakeUp" value="07:00">
            <label>Duration:</label>
            <div class="duration-row">
                <input type="number" id="wakeUpHours" value="1" min="0" placeholder="h">
                <span class="duration-label">h</span>
                <input type="number" id="wakeUpMinutes" value="0" min="0" max="59" placeholder="m">
                <span class="duration-label">m</span>
            </div>

            <label for="collegeStart">College Start:</label>
            <input type="time" id="collegeStart" value="09:00">

            <label for="collegeEnd">College End:</label>
            <input type="time" id="collegeEnd" value="17:00">

            <h3>Extra Activities</h3>
            <div id="extraActivities">
                <div class="activity-row">
                    <input type="text" class="activity-name" placeholder="Activity">
                    <input type="time" class="activity-time" value="18:00">
                    <input type="number" class="duration-h" value="1" min="0" placeholder="h">
                    <input type="number" class="duration-m" value="0" min="0" max="59" placeholder="m">
                    <button type="button" class="remove-activity">−</button>
                </div>
                <div class="activity-row">
                    <input type="text" class="activity-name" placeholder="Activity">
                    <input type="time" class="activity-time" value="20:00">
                    <input type="number" class="duration-h" value="1" min="0" placeholder="h">
                    <input type="number" class="duration-m" value="0" min="0" max="59" placeholder="m">
                    <button type="button" class="remove-activity">−</button>
                </div>
            </div>
            <button type="button" id="addActivity">+ Add Activity</button>
            <button type="button" id="generateBtn">Generate Schedule</button>
        </div>

        <div class="now-section">
            <h2>What should I do now?</h2>
            <p id="currentTask">Generate your schedule first!</p>
        </div>

        <div class="plan-section">
            <h2>Your Daily Plan</h2>
            <ul id="scheduleList">
                <li class="empty-state">Generate schedule first</li>
            </ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
