<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Flow Optimizer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Daily Flow Optimizer</h1>

    <div class="input-section">

        <h2>Plan Your Day</h2>

        <label>When do you wake up?</label>
        <input type="time" id="wakeUp" value="07:00">

        <label>Morning routine duration</label>
        <div class="duration-row">
            <input type="number" id="wakeUpHours" value="1"> <span>hours</span>
            <input type="number" id="wakeUpMinutes" value="0"> <span>minutes</span>
        </div>

        <h3>College Schedule</h3>
        <label>When does it begin?</label>
        <input type="time" id="collegeStart">

        <label>When does it end?</label>
        <input type="time" id="collegeEnd">

        <h3>Activities</h3>
        <div id="extraActivities"></div>

        <button id="addActivity">+ Add Activity</button>

        <button id="generateBtn">Create My Day Plan</button>

    </div>

    <div class="output-section" style="display:none;">

        <h2>Your Day Plan</h2>

        <p id="currentTask"></p>

        <ul id="scheduleList"></ul>

        <button id="editBtn">Edit Plan</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
